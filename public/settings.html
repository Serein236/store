<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统设置 - 仓库管理系统</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- 公共样式 -->
    <link href="css/common.css" rel="stylesheet">
    <style>
        .settings-card {
            transition: all 0.3s;
        }
        .settings-card:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,.1);
        }
        .form-label {
            font-weight: 500;
        }
        .setting-section {
            border-bottom: 1px solid #e9ecef;
            padding-bottom: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .setting-section:last-child {
            border-bottom: none;
            padding-bottom: 0;
            margin-bottom: 0;
        }
    </style>
</head>

<body>
    <!-- 简洁顶部栏 -->
    <nav class="navbar navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-warehouse me-2"></i>仓库管理系统
            </a>
            <a href="index.html" class="btn btn-outline-light btn-sm">
                <i class="bi bi-house-door me-1"></i>返回首页
            </a>
        </div>
    </nav>

    <!-- 主内容区 -->
    <div class="container-fluid main-content">
        <div class="page-header">
            <h2 class="mb-1"><i class="bi bi-gear me-2"></i>系统设置</h2>
            <p class="mb-0">配置系统参数和个性化选项</p>
        </div>

        <!-- 设置选项卡导航 -->
        <ul class="nav nav-pills mb-4" id="settingsTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="company-tab" data-bs-toggle="pill" data-bs-target="#company" type="button" role="tab">
                    <i class="bi bi-building me-1"></i>公司信息
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="system-tab" data-bs-toggle="pill" data-bs-target="#system" type="button" role="tab">
                    <i class="bi bi-sliders me-1"></i>系统参数
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="export-tab" data-bs-toggle="pill" data-bs-target="#export" type="button" role="tab">
                    <i class="bi bi-file-earmark-arrow-down me-1"></i>导出设置
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="security-tab" data-bs-toggle="pill" data-bs-target="#security" type="button" role="tab">
                    <i class="bi bi-shield-lock me-1"></i>安全设置
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="data-tab" data-bs-toggle="pill" data-bs-target="#data" type="button" role="tab">
                    <i class="bi bi-database me-1"></i>数据管理
                </button>
            </li>
        </ul>

        <!-- 选项卡内容 -->
        <div class="tab-content" id="settingsTabContent">

            <!-- 公司信息设置 -->
            <div class="tab-pane fade show active" id="company" role="tabpanel">
                <div class="card settings-card">
                    <div class="card-header">
                        <i class="bi bi-building me-2"></i>公司信息
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="companyName" class="form-label">公司名称</label>
                                    <input type="text" class="form-control" id="companyName" placeholder="请输入公司名称">
                                    <div class="form-text">此名称将显示在出库单标题中</div>
                                </div>
                                <div class="mb-3">
                                    <label for="companyPhone" class="form-label">联系电话</label>
                                    <input type="text" class="form-control" id="companyPhone" placeholder="请输入联系电话">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="companyAddress" class="form-label">公司地址</label>
                                    <textarea class="form-control" id="companyAddress" rows="5" placeholder="请输入公司地址"></textarea>
                                </div>
                            </div>
                        </div>
                        <button class="btn btn-primary" onclick="saveCompanySettings()">
                            <i class="bi bi-save me-2"></i>保存公司信息
                        </button>
                    </div>
                </div>
            </div>

            <!-- 系统参数设置 -->
            <div class="tab-pane fade" id="system" role="tabpanel">
                <div class="card settings-card">
                    <div class="card-header">
                        <i class="bi bi-sliders me-2"></i>系统参数
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="pageSize" class="form-label">每页显示记录数</label>
                                    <select class="form-select" id="pageSize">
                                        <option value="10">10条</option>
                                        <option value="20">20条</option>
                                        <option value="50">50条</option>
                                        <option value="100">100条</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="dateFormat" class="form-label">日期格式</label>
                                    <select class="form-select" id="dateFormat">
                                        <option value="YYYY-MM-DD">YYYY-MM-DD</option>
                                        <option value="YYYY/MM/DD">YYYY/MM/DD</option>
                                        <option value="DD-MM-YYYY">DD-MM-YYYY</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" id="autoRefresh">
                            <label class="form-check-label" for="autoRefresh">启用自动刷新库存数据</label>
                        </div>
                        <button class="btn btn-primary" onclick="saveSystemSettings()">
                            <i class="bi bi-save me-2"></i>保存系统参数
                        </button>
                    </div>
                </div>
            </div>

            <!-- 导出设置 -->
            <div class="tab-pane fade" id="export" role="tabpanel">
                <div class="card settings-card">
                    <div class="card-header">
                        <i class="bi bi-file-earmark-arrow-down me-2"></i>导出设置
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="defaultExportFormat" class="form-label">默认导出格式</label>
                                    <select class="form-select" id="defaultExportFormat">
                                        <option value="excel">Excel (.xlsx)</option>
                                        <option value="csv">CSV (.csv)</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="exportTemplate" class="form-label">出库单模板</label>
                                    <select class="form-select" id="exportTemplate">
                                        <option value="standard">标准模板</option>
                                        <option value="detailed">详细模板</option>
                                        <option value="simple">简洁模板</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" id="includeLogo">
                            <label class="form-check-label" for="includeLogo">导出时包含公司LOGO</label>
                        </div>
                        <button class="btn btn-primary" onclick="saveExportSettings()">
                            <i class="bi bi-save me-2"></i>保存导出设置
                        </button>
                    </div>
                </div>
            </div>

            <!-- 安全设置 -->
            <div class="tab-pane fade" id="security" role="tabpanel">
                <div class="card settings-card">
                    <div class="card-header">
                        <i class="bi bi-shield-lock me-2"></i>安全设置
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-6">
                                <h6 class="mb-3">会话与通知</h6>
                                <div class="mb-3">
                                    <label for="sessionTimeout" class="form-label">会话超时时间（分钟）</label>
                                    <input type="number" class="form-control" id="sessionTimeout" min="5" max="480" value="30">
                                </div>
                                <div class="form-check form-switch mb-3">
                                    <input class="form-check-input" type="checkbox" id="requirePasswordChange">
                                    <label class="form-check-label" for="requirePasswordChange">定期要求修改密码</label>
                                </div>
                                <div class="form-check form-switch mb-3">
                                    <input class="form-check-input" type="checkbox" id="loginNotification">
                                    <label class="form-check-label" for="loginNotification">登录时发送通知</label>
                                </div>
                                <button class="btn btn-primary" onclick="saveSecuritySettings()">
                                    <i class="bi bi-save me-2"></i>保存安全设置
                                </button>
                            </div>
                            <div class="col-md-6">
                                <h6 class="mb-3"><i class="bi bi-key me-2"></i>修改密码</h6>
                                <div class="mb-3">
                                    <label for="currentPassword" class="form-label">当前密码</label>
                                    <input type="password" class="form-control" id="currentPassword" placeholder="请输入当前密码">
                                </div>
                                <div class="mb-3">
                                    <label for="newPassword" class="form-label">新密码</label>
                                    <input type="password" class="form-control" id="newPassword" placeholder="请输入新密码（至少6位）">
                                </div>
                                <div class="mb-3">
                                    <label for="confirmPassword" class="form-label">确认新密码</label>
                                    <input type="password" class="form-control" id="confirmPassword" placeholder="请再次输入新密码">
                                </div>
                                <button class="btn btn-warning" onclick="changePassword()">
                                    <i class="bi bi-shield-check me-2"></i>修改密码
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 数据管理 -->
            <div class="tab-pane fade" id="data" role="tabpanel">
                <div class="card settings-card border-warning">
                    <div class="card-header bg-warning text-dark">
                        <i class="bi bi-exclamation-triangle me-2"></i>数据管理
                    </div>
                    <div class="card-body">
                        <!-- 自动备份设置 -->
                        <div class="setting-section">
                            <h6><i class="bi bi-clock-history me-2"></i>自动备份设置</h6>
                            <div class="row">
                                <div class="col-md-4">
                                    <div class="form-check form-switch mb-3">
                                        <input class="form-check-input" type="checkbox" id="autoBackupEnabled">
                                        <label class="form-check-label" for="autoBackupEnabled">启用自动备份</label>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <label for="autoBackupFrequency" class="form-label">备份频率</label>
                                    <select class="form-select" id="autoBackupFrequency">
                                        <option value="daily">每天</option>
                                        <option value="weekly">每周</option>
                                        <option value="monthly">每月</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label for="backupRetention" class="form-label">保留备份数量</label>
                                    <input type="number" class="form-control" id="backupRetention" min="1" max="50" value="10">
                                </div>
                            </div>
                            <button class="btn btn-outline-primary btn-sm" onclick="saveAutoBackupConfig()">
                                <i class="bi bi-save me-1"></i>保存自动备份配置
                            </button>
                        </div>

                        <!-- 手动备份和备份列表 -->
                        <div class="setting-section">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h6><i class="bi bi-download me-2"></i>数据备份</h6>
                                <button class="btn btn-primary" onclick="backupData()">
                                    <i class="bi bi-plus-circle me-2"></i>立即备份
                                </button>
                            </div>
                            <p class="text-muted">备份文件保存在项目根目录 backup 文件夹中</p>

                            <!-- 备份列表 -->
                            <div class="table-responsive">
                                <table class="table table-striped table-hover">
                                    <thead class="table-dark">
                                        <tr>
                                            <th>文件名</th>
                                            <th>大小</th>
                                            <th>创建者</th>
                                            <th>创建时间</th>
                                            <th>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody id="backupListBody">
                                    </tbody>
                                </table>
                            </div>
                            <div id="backupListEmpty" class="text-center text-muted py-3 d-none">
                                <i class="bi bi-inbox fs-1"></i>
                                <p>暂无备份记录</p>
                            </div>
                        </div>

                        <!-- 数据清理 -->
                        <div class="row">
                            <div class="col-md-12">
                                <h6><i class="bi bi-trash me-2"></i>数据清理</h6>
                                <p class="text-muted">清理指定日期之前的出入库记录（此操作不可逆，请谨慎操作）</p>
                                <div class="input-group mb-2" style="max-width: 400px;">
                                    <input type="date" class="form-control" id="cleanupDate">
                                    <button class="btn btn-outline-danger" onclick="cleanupData()">
                                        <i class="bi bi-trash me-2"></i>清理数据
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            &copy; 2026 仓库管理系统 | <a href="https://beian.miit.gov.cn/" target="_blank"
                class="text-decoration-none text-reset">鄂ICP备2025167566号</a>
        </div>
    </footer>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/settings.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const beianLink = document.querySelector('footer a[href*="beian.miit.gov.cn"]');
            if (beianLink && config.beian) {
                beianLink.textContent = config.beian;
            }
        });
    </script>
</body>

</html>
